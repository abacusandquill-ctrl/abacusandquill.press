<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abacus & Quill</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0e0e0e;
        color: #e8e0d0;
        font-family: Georgia, serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .container { max-width: 520px; }
      h1 {
        font-size: 1.4rem;
        font-weight: normal;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin-bottom: 2rem;
      }
      p {
        font-size: 1.05rem;
        line-height: 1.8;
        color: #b0a898;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Abacus &amp; Quill</h1>
      <p>New stories that feel remembered.<br>

    </div>
  </body>
  </html>
